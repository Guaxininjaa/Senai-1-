<!DOCTYPE html>                                               <!-- Define que este é um documento HTML5 moderno -->
<html lang="pt-BR">                                           <!-- Abre o site e define o idioma como Português do Brasil -->
<head>                                                        <!-- Cabeçalho: configurações invisíveis para o usuário -->
    <meta charset="UTF-8">                                    <!-- Permite o uso de acentuação e caracteres especiais (ç, ã, é) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Ajusta a tela para ficar perfeita em celulares (responsividade) -->
    <title>Sistemas de Aprendizado</title>                    <!-- Define o título que aparece lá na aba superior do navegador -->
    <link rel="stylesheet" href="home.css">                   <!-- Conecta a página ao seu arquivo de design/estilos (CSS) -->
</head>                                                       <!-- Fecha a sessão do cabeçalho -->
<body class="pagina-home">                                    <!-- Corpo do site. A classe ajuda a estilizar apenas a Home no CSS -->
    <div class="hero-bg">                                     <!-- Divisão (caixa) que agrupa tudo, onde você vai colocar a imagem de fundo -->
        
        <!-- Cabeçalho apenas com a Logo na esquerda (sem menus na direita) -->
        <header class="navbar">                               <!-- Define a área da barra de navegação no topo do site -->
            <div class="logo">| APRENDIZADO</div>             <!-- Espaço que guarda o texto da sua logo -->
        </header>                                             <!-- Fecha a barra de navegação -->

        <!-- Conteúdo Principal -->
        <main class="hero-content">                           <!-- Define a área onde fica o conteúdo principal (textos e botões) -->
            <h1>Desenvolvimento<br>de Sistemas</h1>           <!-- Título principal (H1). A tag <br> força a quebra de linha no texto -->
            
            <!-- <p>Do Código ao Conhecimento. Explore os Cursos Práticos de<br>
            "Desenvolvimento de Sistemas" e "Arquitetura de Software".<br>
            Comece sua jornada agora!</p> -->                 <!-- Parágrafo "desativado". Como está entre os sinais de comentário, não aparece no site -->
            
            <div class="container-botoes">                    <!-- Caixa invisível criada para manter seus dois botões alinhados -->
                <!-- Botão apontando para a sua página de exercícios do JS -->
                <a href="index.html" class="btn btn-laranja">ACESSAR EXERCÍCIOS JAVASCRIPT</a> <!-- Link que leva para sua página principal de JS -->
                <a href="saibaMais.html" class="btn btn-transparente">SAIBA MAIS</a>           <!-- Link que leva para a página extra de informações -->
            </div>                                            <!-- Fecha a caixa que agrupa os botões -->
        </main>                                               <!-- Fecha a área de conteúdo principal -->

    </div>                                                    <!-- Fecha a caixa de agrupamento do fundo (hero-bg) -->
</body>                                                       <!-- Fecha o corpo da página -->
</html>                                                       <!-- Fecha a estrutura do documento HTML -->
